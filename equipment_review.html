<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="nexus-core.css"><title>Equipment Review</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:#fff;background:linear-gradient(rgba(0,0,0,.38),rgba(0,0,0,.38)),url("transformer.jpg") center/cover fixed no-repeat #b60000}.nx-header-wrap{background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.18)}.nx-header{max-width:1120px;margin:0 auto;padding:14px 18px}.nx-header img{height:54px}.wrap{max-width:1120px;margin:18px auto 60px;padding:0 18px}.card{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:18px}.topbar{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{padding:12px 16px;border-radius:999px;border:2px solid #00c2ff;background:#0a0f24;color:#3ecbff;font-weight:900;text-decoration:none;cursor:pointer}.btn.secondary{border-color:rgba(255,255,255,.35);color:#fff;background:rgba(0,0,0,.2)}h1{margin:0 0 6px;font-size:30px;font-weight:1000}.sub{margin:0;font-weight:850}.banner{margin:14px 0;padding:16px;border-radius:16px;background:rgba(0,0,0,.34);border:2px solid rgba(255,255,255,.2);font-weight:1000}.banner.good{border-color:rgba(45,255,155,.5)}.banner.check{border-color:rgba(255,213,74,.5)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}.metric{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:14px}.metric .label{font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:.12em}.metric .num{font-size:32px;font-weight:1000;margin-top:6px}.section{margin-top:14px;background:rgba(255,255,255,.96);color:#111;border-radius:16px;border:1px solid rgba(0,0,0,.08);padding:16px}.section h2{margin:0 0 8px;font-size:18px;border-bottom:2px solid rgba(0,0,0,.08);padding-bottom:6px}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid rgba(0,0,0,.15);padding:8px;vertical-align:top;font-size:13px;word-break:break-word}th{background:rgba(0,0,0,.05);text-align:left;font-weight:900}.pill{display:inline-flex;min-width:86px;justify-content:center;padding:7px 10px;border-radius:999px;font-weight:1000;border:1px solid rgba(0,0,0,.12);font-size:12px}.yes{background:rgba(45,255,155,.2);color:#003f22}.no{background:rgba(255,213,74,.22);color:#553f00}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}.nx-footer{margin-top:40px;padding:18px 12px;text-align:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.85);background:rgba(0,0,0,.35);border-top:1px solid rgba(255,255,255,.18)}
</style></head>
<body><div class="nexus-page"><div id="nxSessionBanner" class="nx-session-banner"><div class="nx-left"><span class="nx-pill">HyperCore</span><span class="nx-pill">Equipment Review</span></div></div><a class="nx-back-btn" href="#" onclick="history.back();return false;">← Back</a><div class="nx-header-wrap"><div class="nx-header"><img src="nexus.png" alt="NEXUS"></div></div><div class="wrap"><div class="card"><div class="topbar"><div><h1 id="title">Equipment Review</h1><p class="sub">Read-only detail from saved browser data.</p></div><div class="actions"><button class="btn" id="loadBtn" type="button">Load</button><a class="btn secondary" id="openEquipment" href="#">Open Equipment</a><a class="btn secondary" id="openExport" href="#">Export</a><a class="btn secondary" href="validation_dashboard.html">Dashboard</a></div></div><div id="banner" class="banner check">Load equipment review.</div><div class="grid"><div class="metric"><div class="label">Workflow</div><div class="num" id="mWorkflow">0/8</div></div><div class="metric"><div class="label">Open Items</div><div class="num" id="mOpen">0</div></div><div class="metric"><div class="label">Data Gaps</div><div class="num" id="mGaps">0</div></div><div class="metric"><div class="label">Ready</div><div class="num" id="mReady">NO</div></div></div><div id="detailHost" class="section"><h2>Review Detail</h2><div>Click Load.</div></div></div></div><footer class="nx-footer">© 2026 NEXUS Data Science LLC — All Rights Reserved</footer></div>
<script>
(function(){'use strict';var qs=new URLSearchParams(location.search||'');var eq=(qs.get('eq')||'').trim();try{if(!eq)eq=(localStorage.getItem('nexus_active_eq')||localStorage.getItem('nexus_active_equipment')||'').trim();}catch(e){}var steps=['ccs','phenolic','rif','meg','torque','l2','prefod','fpv'];var prefix='nexus_'+(eq||'NO_EQ')+'_';function esc(v){return String(v==null?'':v).replace(/[&<>\"]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':c==='>'?'&gt;':'&quot;';});}function raw(k){try{return localStorage.getItem(k);}catch(e){return null;}}function done(s){if(s==='meg')return raw(prefix+'step_meg')==='1'||(raw(prefix+'step_megohmmeter_line')==='1'&&raw(prefix+'step_megohmmeter_load')==='1');if(s==='fpv')return raw(prefix+'step_fpv')==='1'||raw(prefix+'step_fpv_photo')==='1'||!!raw(prefix+'fpv_photo');if(s==='ccs')return raw(prefix+'step_ccs')==='1'||raw(prefix+'ccs_signed_off')==='1';return raw(prefix+'step_'+s)==='1'||raw(prefix+s+'_complete')==='1'||raw(prefix+s+'_completed')==='1';}function hit(keys){for(var i=0;i<keys.length;i++){var k=keys[i].replace('{eq}',eq);var v=raw(k);if(v)return {key:k,size:v.length};}return null;}function sz(n){if(n>1000000)return Math.round(n/100000)/10+' MB';if(n>1000)return Math.round(n/1000)+' KB';return n+' B';}function pill(t,y){return '<span class="pill '+(y?'yes':'no')+'">'+esc(t)+'</span>';}function table(h,rows){return '<table><thead><tr>'+h.map(function(x){return '<th>'+esc(x)+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r){return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';}function load(){document.getElementById('title').textContent='Equipment Review: '+(eq||'(missing eq)');document.getElementById('openEquipment').href=eq?'equipment.html?eq='+encodeURIComponent(eq):'equipment.html';document.getElementById('openExport').href=eq?'package_export.html?eq='+encodeURIComponent(eq):'package_export.html';var complete=steps.filter(done).length;var open=steps.filter(function(s){return !done(s);}).map(function(s){return s.toUpperCase();});var data={CCS:['nexus_{eq}_ccs_vanguard_export','nexus_{eq}_ccs_two_tab_v1','nexus_{eq}_ccs_export','nexus_{eq}_ccs'],RIF:['nexus_{eq}_rif_export','nexus_{eq}_rif','rif_{eq}'],L2:['nexus_{eq}_l2_export','nexus_{eq}_l2','nexus_{eq}_form_l2','l2_{eq}'],MEG:['nexus_{eq}_meg_vanguard_validation_v1','nexus_{eq}_meg_export','nexus_{eq}_meg_log','nexus_{eq}_meg_rows','meg_{eq}'],Torque:['nexus_{eq}_torque_vanguard_validation_v1','nexus_{eq}_torque_export','nexus_{eq}_torque_log','nexus_{eq}_torque_rows','torque_{eq}'],TILT:['nexus_{eq}_torque_tilt_signoffs_v1','nexus_{eq}_torque_tilt_confirmations_v1','nexus_{eq}_tilt_test','nexus_{eq}_tilt'],PreFOD:['nexus_{eq}_prefod_export','nexus_{eq}_prefod_vanguard_export','nexus_{eq}_prefod_checklist_v1','nexus_{eq}_prefod'],FPV:['nexus_{eq}_fpv_vanguard_validation_v1','nexus_{eq}_fpv_export','nexus_{eq}_fpv','nexus_{eq}_fpv_photo']};var rows=[];var gaps=[];Object.keys(data).forEach(function(name){var h=hit(data[name]);if(!h)gaps.push(name);rows.push([esc(name),h?pill('FOUND',true):pill('MISSING',false),h?'<span class="mono">'+esc(h.key)+'</span> '+esc(sz(h.size)):'']);});var ready=complete===steps.length&&gaps.length===0;document.getElementById('mWorkflow').textContent=complete+'/'+steps.length;document.getElementById('mOpen').textContent=open.length;document.getElementById('mGaps').textContent=gaps.length;document.getElementById('mReady').textContent=ready?'YES':'NO';var b=document.getElementById('banner');b.className='banner '+(ready?'good':'check');b.textContent=ready?'All tracked work and saved data are present.':'Open items or data gaps remain.';var workRows=steps.map(function(s){return [s.toUpperCase(),done(s)?pill('COMPLETE',true):pill('OPEN',false)];});document.getElementById('detailHost').innerHTML='<h2>Workflow</h2>'+table(['Step','Status'],workRows)+'<h2>Saved Data</h2>'+table(['Section','Status','Source'],rows)+'<h2>Summary</h2><table><tbody><tr><th>Equipment</th><td>'+esc(eq||'')+'</td></tr><tr><th>Open Items</th><td>'+esc(open.join(', ')||'None')+'</td></tr><tr><th>Data Gaps</th><td>'+esc(gaps.join(', ')||'None')+'</td></tr></tbody></table>';}document.getElementById('loadBtn').addEventListener('click',load);if(eq)load();})();
</script></body></html>
